<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog — GreySphere</title>
    <meta
      name="description"
      content="Perspectives on branding, marketing, and business strategy from the GreySphere team."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=General+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="global.css" />

    <style>
      /* ── Page hero ── */
      .blog-hero {
        background: var(--navy);
        padding: 100px 0 72px;
        text-align: center;
      }
      .blog-hero .eyebrow {
        font-family: var(--font-sans);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--amber);
        margin-bottom: 16px;
      }
      .blog-hero h1 {
        font-family: var(--font-serif);
        font-size: clamp(2.4rem, 5vw, 3.6rem);
        color: var(--snow);
        margin-bottom: 20px;
        line-height: 1.15;
      }
      .blog-hero p {
        font-family: var(--font-sans);
        font-size: 1.05rem;
        color: rgba(250, 251, 252, 0.65);
        max-width: 520px;
        margin: 0 auto;
        line-height: 1.7;
      }

      /* ── Filter bar ── */
      .filter-bar {
        background: var(--snow);
        border-bottom: 1px solid var(--slate-200);
        position: sticky;
        top: 64px; /* sit below fixed navbar */
        z-index: 90;
      }
      .filter-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 40px;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
        padding-top: 16px;
        padding-bottom: 16px;
      }
      .filter-inner::-webkit-scrollbar {
        display: none;
      }
      .filter-btn {
        font-family: var(--font-sans);
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--slate-600);
        background: var(--slate-100);
        border: 1px solid var(--slate-200);
        border-radius: 100px;
        padding: 6px 16px;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.2s;
      }
      .filter-btn:hover,
      .filter-btn.active {
        background: var(--navy);
        color: var(--snow);
        border-color: var(--navy);
      }

      /* ── Grid ── */
      .blog-section {
        padding: 64px 0 96px;
        background: var(--snow);
      }
      .blog-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 40px;
      }
      .blog-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 32px;
      }

      /* ── Card ── */
      .blog-card {
        background: #fff;
        border: 1px solid var(--slate-200);
        border-radius: 16px;
        overflow: hidden;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }
      .blog-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 16px 48px rgba(28, 53, 94, 0.12);
      }
      .card-thumb {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        background: var(--slate-100);
        display: block;
      }
      /* Placeholder gradient shown when no image is set */
      .card-thumb-placeholder {
        width: 100%;
        aspect-ratio: 16/9;
        background: linear-gradient(135deg, var(--navy) 0%, #2d5a9e 100%);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card-thumb-placeholder svg {
        opacity: 0.25;
      }
      .card-body {
        padding: 24px;
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .card-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .card-category {
        font-family: var(--font-sans);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--amber);
      }
      .card-date {
        font-family: var(--font-sans);
        font-size: 0.75rem;
        color: var(--slate-400);
      }
      .card-title {
        font-family: var(--font-serif);
        font-size: 1.2rem;
        color: var(--navy);
        line-height: 1.35;
        margin-bottom: 10px;
      }
      .card-excerpt {
        font-family: var(--font-sans);
        font-size: 0.875rem;
        color: var(--slate-600);
        line-height: 1.65;
        flex: 1;
        margin-bottom: 20px;
      }
      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--slate-100);
        padding-top: 16px;
      }
      .card-readtime {
        font-family: var(--font-sans);
        font-size: 0.75rem;
        color: var(--slate-400);
      }
      .card-arrow {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--slate-100);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      .blog-card:hover .card-arrow {
        background: var(--amber);
      }
      .blog-card:hover .card-arrow svg path {
        stroke: #fff;
      }

      /* ── Empty / loading states ── */
      .grid-message {
        grid-column: 1 / -1;
        text-align: center;
        padding: 80px 0;
        font-family: var(--font-sans);
        font-size: 1rem;
        color: var(--slate-400);
      }

      /* ── Responsive ── */
      @media (max-width: 900px) {
        .blog-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .blog-container {
          padding: 0 24px;
        }
        .filter-inner {
          padding: 16px 24px;
        }
      }
      @media (max-width: 600px) {
        .blog-grid {
          grid-template-columns: 1fr;
        }
        .blog-hero {
          padding: 80px 24px 56px;
        }
      }
    </style>
  </head>

  <body>
    <div id="site-header"></div>

    <!-- Hero -->
    <section class="blog-hero">
      <p class="eyebrow">From the desk of GreySphere</p>
      <h1>Blogs</h1>
      <p>
        Perspectives on branding, marketing, and business strategy — written for
        founders who think long-term.
      </p>
    </section>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="filter-inner" id="filterBar">
        <button class="filter-btn active" data-category="All">All</button>
        <!-- Category buttons injected by JS -->
      </div>
    </div>

    <!-- Grid -->
    <section class="blog-section">
      <div class="blog-container">
        <div class="blog-grid" id="blogGrid">
          <p class="grid-message">Loading posts…</p>
        </div>
      </div>
    </section>

    <div id="site-footer"></div>
    <script src="global.js"></script>

    <script>
      // ── Helpers ──────────────────────────────────────────────
      function formatDate(dateStr) {
        const d = new Date(dateStr + "T00:00:00");
        return d.toLocaleDateString("en-IN", {
          day: "numeric",
          month: "long",
          year: "numeric",
        });
      }

      function thumbHTML(post) {
        if (post.thumbnail) {
          return `<img class="card-thumb" src="${post.thumbnail}" alt="${post.title}" loading="lazy" onerror="this.outerHTML=placeholderHTML()">`;
        }
        return placeholderHTML();
      }

      function placeholderHTML() {
        return `<div class="card-thumb-placeholder">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="10" width="40" height="28" rx="3" stroke="white" stroke-width="2"/>
          <circle cx="16" cy="20" r="4" stroke="white" stroke-width="2"/>
          <path d="M4 32l10-8 8 6 8-10 14 10" stroke="white" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </div>`;
      }

      function buildCard(post) {
        return `
        <a class="blog-card" href="${post.file}">
          ${thumbHTML(post)}
          <div class="card-body">
            <div class="card-meta">
              <span class="card-category">${post.category}</span>
              <span class="card-date">${formatDate(post.date)}</span>
            </div>
            <h2 class="card-title">${post.title}</h2>
            <p class="card-excerpt">${post.excerpt}</p>
            <div class="card-footer">
              <span class="card-readtime">${post.readTime}</span>
              <span class="card-arrow">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M2 7h10M8 3l4 4-4 4" stroke="#1c355e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </div>
          </div>
        </a>`;
      }

      // ── Main ─────────────────────────────────────────────────
      let allPosts = [];
      let activeCategory = "All";

      function renderGrid(posts) {
        const grid = document.getElementById("blogGrid");
        if (!posts.length) {
          grid.innerHTML =
            '<p class="grid-message">No posts in this category yet.</p>';
          return;
        }
        grid.innerHTML = posts.map(buildCard).join("");
        /* Fade cards in with a small stagger instead of relying on
           IntersectionObserver (which runs before cards exist) */
        grid.querySelectorAll(".blog-card").forEach(function (card, i) {
          card.style.opacity = "0";
          card.style.transform = "translateY(20px)";
          card.style.transition = "opacity 0.4s ease " + (i * 0.07) + "s, transform 0.4s ease " + (i * 0.07) + "s";
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              card.style.opacity = "1";
              card.style.transform = "translateY(0)";
            });
          });
        });
      }

      function renderFilters(posts) {
        const bar = document.getElementById("filterBar");
        const categories = ["All", ...new Set(posts.map((p) => p.category))];
        bar.innerHTML = categories
          .map(
            (cat) =>
              `<button class="filter-btn ${
                cat === "All" ? "active" : ""
              }" data-category="${cat}">${cat}</button>`
          )
          .join("");

        bar.addEventListener("click", (e) => {
          const btn = e.target.closest(".filter-btn");
          if (!btn) return;
          bar
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          activeCategory = btn.dataset.category;
          const filtered =
            activeCategory === "All"
              ? allPosts
              : allPosts.filter((p) => p.category === activeCategory);
          renderGrid(filtered);
        });
      }

      fetch("blogs/data.json")
        .then((r) => r.json())
        .then((posts) => {
          allPosts = posts.sort((a, b) => new Date(b.date) - new Date(a.date));
          renderFilters(allPosts);
          renderGrid(allPosts);
        })
        .catch(() => {
          document.getElementById("blogGrid").innerHTML =
            '<p class="grid-message">Could not load posts. Please try again later.</p>';
        });
    </script>
  </body>
</html>
